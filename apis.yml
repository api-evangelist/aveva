- aid: aveva:aveva-pi-system-rest-api
  name: AVEVA PI System REST API
  description: The AVEVA PI System REST API (PI Web API) provides RESTful HTTP access
    to time- series sensor data, asset metadata, and event frames stored in PI Server.
    Supports GET, POST, PUT, PATCH, and DELETE operations for reading real-time and
    historical process data, managing PI AF asset hierarchies, and streaming data
    via WebSocket.
  humanURL: https://www.aveva.com/en/products/aveva-pi-system-developer-technologies/
  baseURL: https://{pi-server}/piwebapi
