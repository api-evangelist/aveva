apis:
- aid: aveva:aveva-connect-rest-api
  name: AVEVA CONNECT REST API
  description: The AVEVA CONNECT cloud platform REST APIs provide access to industrial
    data services including account management, identity management, data ingress
    pipelines, data views, and time-series retrieval. Enables cloud-native integration
    of OT data from AVEVA System Platform, Plant SCADA, and PI System into analytics
    and enterprise applications.
  humanURL: https://docs.aveva.com/
  baseURL: https://api.connect.aveva.com
