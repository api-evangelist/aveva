aid: aveva
name: AVEVA
description: AVEVA is an industrial software company (a subsidiary of Schneider Electric)
  providing engineering, operations, and data management software for energy, utilities,
  marine, and manufacturing industries. AVEVA's product portfolio includes System
  Platform (unified SCADA/MES/IIoT), Plant SCADA, MES, Edge, PI System (industrial
  data infrastructure), and CONNECT cloud services, all of which expose REST APIs
  for industrial data integration, asset management, and operational analytics.
