  namespaceId: ID!
}

# ─── Root Types ───────────────────────────────────────────────────────────────

type Query {
  # PI Server
  piServer(id: ID!): PIServer
  piServers: [PIServer!]!

  # PI Data Archive
  piDataArchive(serverId: ID!): PIDataArchive
  piPoint(id: ID!): PIPoint
  piPointByTag(tag: String!, serverId: ID!): PIPoint
  piPoints(serverId: ID!, filter: PIPointFilter, first: Int, after: String): PIPointConnection!

  # PI Asset Framework
  piAssetServer(serverId: ID!): PIAssetServer
  piAFDatabase(id: ID!): PIAFDatabase
  piAFDatabases(serverId: ID!, first: Int, after: String): PIAFDatabaseConnection!
  element(id: ID!): Element
  elementByPath(path: String!, databaseId: ID!): Element
  elements(databaseId: ID!, filter: ElementFilter, first: Int, after: String): ElementConnection!
  elementTemplate(id: ID!): ElementTemplate
  elementTemplates(databaseId: ID!, first: Int, after: String): ElementTemplateConnection!
  eventFrame(id: ID!): EventFrame
  eventFrames(databaseId: ID!, filter: EventFrameFilter, first: Int, after: String): EventFrameConnection!
  eventFrameTemplate(id: ID!): EventFrameTemplate

  # PI Analysis
  analysis(id: ID!): Analysis
  analyses(serverId: ID!, filter: AnalysisFilter, first: Int, after: String): AnalysisConnection!

  # AVEVA CONNECT
  tenant(id: ID!): Tenant
  tenants: [Tenant!]!
  namespace(id: ID!): Namespace
  namespaces(tenantId: ID!, first: Int, after: String): NamespaceConnection!
  stream(id: ID!): Stream
  streams(namespaceId: ID!, filter: StreamFilter, first: Int, after: String): StreamConnection!
  streamType(id: ID!): StreamType
  connectAsset(id: ID!): ConnectAsset
  connectAssets(namespaceId: ID!, filter: ConnectAssetFilter, first: Int, after: String): ConnectAssetConnection!
  dataView(id: ID!): DataView
  dataViews(namespaceId: ID!, first: Int, after: String): DataViewConnection!

  # Identity & Access
  user(id: ID!): User
  users(tenantId: ID!, first: Int, after: String): UserConnection!
  role(id: ID!): Role
  roles: [Role!]!
  apiClient(id: ID!): ApiClient

  # Plant SCADA
  scadaProject(id: ID!): ScadaProject
  scadaProjects: [ScadaProject!]!
  scadaTag(id: ID!): ScadaTag
  scadaTags(projectId: ID!, filter: ScadaTagFilter, first: Int, after: String): ScadaTagConnection!
  alarm(id: ID!): Alarm
  alarms(projectId: ID!, filter: AlarmFilter, first: Int, after: String): AlarmConnection!

  # MES
  workOrder(id: ID!): WorkOrder
  workOrders(productionLineId: ID, filter: WorkOrderFilter, first: Int, after: String): WorkOrderConnection!
  productionLine(id: ID!): ProductionLine
  productionLines: [ProductionLine!]!
  equipment(id: ID!): Equipment
  material(id: ID!): Material
  materials(first: Int, after: String): [Material!]!

  # Engineering Document Management
  engineeringDocument(id: ID!): EngineeringDocument
  engineeringDocuments(projectId: ID!, filter: DocumentFilter, first: Int, after: String): DocumentConnection!
  engineeringProject(id: ID!): EngineeringProject
  engineeringProjects: [EngineeringProject!]!

  # Unit of Measure
  unitOfMeasure(id: ID!): UnitOfMeasure
  unitsOfMeasure(class: UnitOfMeasureClass): [UnitOfMeasure!]!
}

type Mutation {
  # PI Points
  createPIPoint(serverId: ID!, input: CreatePIPointInput!): PIPoint!
  updatePIPoint(id: ID!, input: UpdatePIPointInput!): PIPoint!
  deletePIPoint(id: ID!): Boolean!
  writeValue(input: WriteValueInput!): TimedValue!
  writeValues(inputs: [WriteValueInput!]!): [TimedValue!]!

  # PI AF Elements
  createElement(input: CreateElementInput!): Element!
  updateElement(id: ID!, name: String, description: String): Element!
  deleteElement(id: ID!): Boolean!

  # PI AF Event Frames
  createEventFrame(input: CreateEventFrameInput!): EventFrame!
  closeEventFrame(input: CloseEventFrameInput!): EventFrame!
  deleteEventFrame(id: ID!): Boolean!

  # AVEVA CONNECT Streams
  createStream(input: CreateStreamInput!): Stream!
  deleteStream(id: ID!): Boolean!
  insertStreamValue(streamId: ID!, timestamp: DateTime!, value: JSON!): StreamValue!
  insertStreamValues(streamId: ID!, values: [WriteValueInput!]!): [StreamValue!]!
  deleteStreamValues(streamId: ID!, startIndex: DateTime!, endIndex: DateTime!): Boolean!

  # Work Orders (MES)
  createWorkOrder(input: CreateWorkOrderInput!): WorkOrder!
  updateWorkOrderStatus(input: UpdateWorkOrderStatusInput!): WorkOrder!
  recordQualityResult(input: RecordQualityResultInput!): QualityResult!

  # Alarms
  acknowledgeAlarm(input: AcknowledgeAlarmInput!): Alarm!
  shelveAlarm(id: ID!, duration: Int!, comment: String): Alarm!
  unshelveAlarm(id: ID!): Alarm!
}

type Subscription {
  """Stream real-time values for a PI Point."""
  piPointValue(tag: String!, serverId: ID!): TimedValue!

  """Stream real-time values for multiple PI Points."""
  piPointValues(tags: [String!]!, serverId: ID!): TimedValue!

  """Stream new or updated event frames."""
  eventFrameCreated(databaseId: ID!): EventFrame!

  """Stream alarm state changes."""
  alarmChanged(projectId: ID!, severity: AlarmSeverity): Alarm!

  """Stream real-time values from an AVEVA CONNECT stream."""
  streamValue(streamId: ID!): StreamValue!

  """Stream work order status changes."""
  workOrderStatusChanged(productionLineId: ID): WorkOrder!
}
